<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCVSITO TU ASISTENTE VIRTUAL</title>
    <style>
        /* Eliminamos márgenes por defecto y fijamos la pantalla con la imagen de fondo */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background-image: url('Fondo_ucv_tarapoto.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: 100svh;
            overflow: hidden;
        }

        /* CONTENEDOR PRINCIPAL: Centra todo el espacio de la pantalla */
        #pantalla-avatar {
            width: 100vw;
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: end;
            justify-content: center;
            padding: 24px 24px 130px;
            box-sizing: border-box;
        }

        /* SOLUCIÓN AL ESCALADO Y ELEVACIÓN: 
           Encapsulamos el SVG en sus proporciones reales para obligar al navegador a obedecer la escala */
        #avatar-svg {
            width: min(60vw, 760px);
            height: min(60vh, 680px);
            height: min(60svh, 680px);
            display: block;
            object-fit: contain;
            
            /* Eliminamos el transform: scale que causaba el conflicto de coordenadas */
            transform: none; 
            
            /* ELEVACIÓN PREMIVM DEL PISO: 
               Al reducir el contenedor, este margen ahora sí empujará al avatar limpiamente hacia arriba */
            margin-bottom: 5vh; 
        }
        
        /* UBICACIÓN DE CONTROLES: Abajo a la derecha, flotando */
        .controles {
            position: absolute;
            bottom: 30px;
            right: 30px; 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            z-index: 10; 
            background: rgba(22, 36, 71, 0.75); 
            padding: 12px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            max-width: min(560px, calc(100vw - 32px));
            box-sizing: border-box;
        }

        button {
            background-color: #0f4c75;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            min-height: 44px;
            white-space: normal;
            text-align: center;
        }

        button:hover { 
            background-color: #3282b8; 
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        } 

        /* Estado flotando justo encima de los botones a la derecha */
        #status { 
            position: absolute;
            bottom: 105px;
            right: 45px; 
            color: #00ffcc; 
            font-style: italic;
            z-index: 10;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            max-width: min(520px, calc(100vw - 40px));
            overflow-wrap: anywhere;
            text-align: right;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            body {
                background-position: center top;
            }

            #pantalla-avatar {
                align-items: center;
                padding: 16px 16px 170px;
            }

            #avatar-svg {
                width: min(92vw, 520px);
                height: min(62vh, 560px);
                height: min(62svh, 560px);
                margin-bottom: 0;
            }

            .controles {
                left: 50%;
                right: auto;
                bottom: max(16px, env(safe-area-inset-bottom));
                width: calc(100vw - 32px);
                transform: translateX(-50%);
                gap: 10px;
                padding: 10px;
                border-radius: 22px;
            }

            button {
                flex: 1 1 160px;
                padding: 12px 14px;
                font-size: 15px;
                border-radius: 16px;
            }

            #status {
                left: 20px;
                right: 20px;
                bottom: calc(112px + env(safe-area-inset-bottom));
                max-width: none;
                text-align: center;
                font-size: 13px;
            }
        }

        @media (max-width: 420px) {
            #pantalla-avatar {
                padding-bottom: 190px;
            }

            #avatar-svg {
                width: 96vw;
                height: 58vh;
                height: 58svh;
            }

            .controles {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
                flex-basis: auto;
            }

            #status {
                bottom: calc(148px + env(safe-area-inset-bottom));
            }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            #pantalla-avatar {
                justify-content: flex-start;
                padding: 12px min(300px, 44vw) 12px 16px;
            }

            #avatar-svg {
                width: min(46vw, 420px);
                height: 88vh;
                height: 88svh;
            }

            .controles {
                left: auto;
                right: 16px;
                bottom: 16px;
                width: min(280px, calc(44vw - 32px));
                min-width: 220px;
                transform: none;
                flex-direction: column;
            }

            #status {
                left: auto;
                right: 16px;
                bottom: 150px;
                width: 280px;
                text-align: right;
            }
        }
    </style>
</head>
<body>

    <div id="pantalla-avatar">
        <object id="avatar-svg" type="image/svg+xml" data="UCVsitoSVG.svg"></object>
    </div>

    <div id="status">Estado: Cargando a UCVsito...</div>

    <div class="controles">
        <button id="btn-hablar" onclick="activarMicrofono()">📢 Hablar con UCVSITO</button>
        <button onclick="detenerTodo()">Detener</button>
    </div>

    <script>
        const svgObject = document.getElementById('avatar-svg');
        let svgDoc = null;
        let bocas = {};
        let intervaloHabla = null;
        const statusText = document.getElementById('status');
        const btnHablar = document.getElementById('btn-hablar');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sintentizadorVoz = window.speechSynthesis;
        let reconocimiento = null;
        let vozSeleccionada = null;

        if (SpeechRecognition) {
            reconocimiento = new SpeechRecognition(); 
            reconocimiento.lang = 'es-ES'; 
            reconocimiento.interimResults = false;
            reconocimiento.maxAlternatives = 1;

            reconocimiento.onresult = async (event) => {
                const textoDictado = event.results[0][0].transcript;
                statusText.innerText = `Escuchado: "${textoDictado}"...`;
                btnHablar.innerText = "⏳ Pensando...";
                btnHablar.style.backgroundColor = "#ffcc00";

                try {
                    const response = await fetch('https://asistente-virtual-vi44.onrender.com/preguntar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pregunta: textoDictado })
                    });
                    const data = await response.json();
                    reproducirVozYAnimar(data.respuesta);
                } catch (error) {
                    console.error("Error conectando al servidor:", error);
                    statusText.innerText = "Estado: Error al conectar con el servidor.";
                    restaurarBoton();
                }
            };

            reconocimiento.onerror = (event) => {
                console.error("Error en micrófono: ", event.error);
                statusText.innerText = "Estado: Error en micrófono.";
                restaurarBoton();
            };

            reconocimiento.onspeechend = () => {
                reconocimiento.stop();
            };
        }

        svgObject.addEventListener('load', () => {
            svgDoc = svgObject.contentDocument;
            bocas = {
                'reposo': svgDoc.getElementById('boca-reposo'),
                'A': svgDoc.getElementById('boca-A'),
                'E': svgDoc.getElementById('boca-E'),
                'O': svgDoc.getElementById('boca-O')
            };
            inyectarAnimacionesNaturales(svgDoc);
            statusText.innerText = "Estado: En reposo";
            cargarVocesPremium();
        });

        function inyectarAnimacionesNaturales(doc) {
            const style = doc.createElementNS("http://www.w3.org/2000/svg", "style");
            style.textContent = `
                @keyframes parpadear {
                    0%, 90%, 100% { transform: scaleY(1); }
                    95% { transform: scaleY(0.0); }
                }
                #ojo-izq, #ojo-der {
                    transform-box: fill-box; 
                    transform-origin: center center; 
                    animation: parpadear 4s infinite;
                }

                @keyframes moverCejaIzq {
                    0%, 71%, 100% { transform: translateY(0px) rotate(0deg); }
                    73% { transform: translateY(-1.5px) rotate(-2deg); }
                    75% { transform: translateY(-1.5px) rotate(-2deg); }
                    80% { transform: translateY(0px) rotate(0deg); }
                }

                @keyframes moverCejaDer {
                    0%, 72%, 100% { transform: translateY(0px) rotate(0deg); }
                    75% { transform: translateY(-2.0px) rotate(1.5deg); }
                    77% { transform: translateY(-2.0px) rotate(1.5deg); }
                    80% { transform: translateY(0px) rotate(0deg); }
                }

                #ceja-izq {
                    transform-box: fill-box;
                    transform-origin: center center;
                    animation: moverCejaIzq 8s infinite ease-in-out;
                }

                #ceja-der {
                    transform-box: fill-box;
                    transform-origin: center center;
                    animation: moverCejaDer 8s infinite ease-in-out;
                }
            `;
            doc.documentElement.appendChild(style);
        }

        function cambiarBoca(tipoBoca) {
            Object.values(bocas).forEach(boca => {
                if(boca) boca.style.display = 'none';
            });
            if(bocas[tipoBoca]) {
                bocas[tipoBoca].style.display = 'block';
            }
        }

        function cargarVocesPremium() {
            if (!sintentizadorVoz) return;
            let voces = sintentizadorVoz.getVoices();
            vozSeleccionada = voces.find(v => v.name.includes('Rodrigo') && v.name.includes('Natural')) ||
                              voces.find(v => v.lang.includes('es-US') && v.name.includes('Google')) ||
                              voces.find(v => v.lang.startsWith('es') && !v.lang.includes('es-ES'));

            if (sintentizadorVoz.onvoiceschanged !== undefined) {
                sintentizadorVoz.onvoiceschanged = () => {
                    voces = sintentizadorVoz.getVoices();
                    vozSeleccionada = voces.find(v => v.name.includes('Rodrigo') && v.name.includes('Natural')) ||
                                      voces.find(v => v.lang.includes('es-US') && v.name.includes('Google')) ||
                                      voces.find(v => v.lang.startsWith('es') && !v.lang.includes('es-ES'));
                };
            }
        }

        function activarMicrofono() {
            if (!reconocimiento) {
                alert("Tu navegador no soporta control por voz. Prueba usando Google Chrome o Microsoft Edge.");
                return;
            }
            sintentizadorVoz.cancel();
            detenerAnimacionBoca();
            reconocimiento.start();
            statusText.innerText = "Estado: Escuchando micrófono...";
            btnHablar.innerText = "🛑 Escuchando...";
            btnHablar.style.backgroundColor = "#ff4d4d";
        }

        function reproducirVozYAnimar(texto) {
            if (!texto) return;
            const textoConPausa = ".. ," + texto; //para evitar que no se escuche la primera silaba
            const lectura = new SpeechSynthesisUtterance(textoConPausa);
            if (vozSeleccionada) {
                lectura.voice = vozSeleccionada;
            } else {
                lectura.lang = 'es-419'; 
            }
            lectura.rate = 1.1; 
            lectura.pitch = 1.3;

            lectura.onstart = () => {
                statusText.innerText = "Estado: UCVsito está respondiendo...";
                btnHablar.innerText = "🗣️ Hablando...";
                btnHablar.style.backgroundColor = "#00cc66";

                setTimeout(() => {
                    // Solo iniciamos la animación si el navegador todavía está reproduciendo voz
                    if (sintentizadorVoz.speaking) {
                        iniciarAnimacionBoca();
                    }
                }, 300); 
            };

            lectura.onend = () => {
                detenerAnimacionBoca();
                restaurarBoton();
            };

            lectura.onerror = () => {
                detenerAnimacionBoca();
                restaurarBoton();
            };
            sintentizadorVoz.speak(lectura);
        }

        function iniciarAnimacionBoca() {
            if (intervaloHabla) return;
            const formasDeBoca = ['A', 'E', 'O', 'reposo'];
            intervaloHabla = setInterval(() => {
                const bocaAleatoria = formasDeBoca[Math.floor(Math.random() * formasDeBoca.length)];
                cambiarBoca(bocaAleatoria);
            }, 130);
        }

        function detenerAnimacionBoca() {
            clearInterval(intervaloHabla);
            intervaloHabla = null;
            cambiarBoca('reposo');
        }

        function restaurarBoton() {
            btnHablar.innerText = "📢 Hablar con el Avatar";
            btnHablar.style.backgroundColor = "";
            statusText.innerText = "Estado: En reposo";
        }

        function detenerTodo() {
            if (reconocimiento) reconocimiento.stop();
            sintentizadorVoz.cancel();
            detenerAnimacionBoca();
            restaurarBoton();
        }
    </script>
</body>
</html>
