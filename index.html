<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCVSITO TU ASISTENTE VIRTUAL</title>
    <style>
        /* Eliminamos márgenes por defecto y fijamos la pantalla con la imagen de fondo */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-image: url('Fondo_ucv_tarapoto.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', sans-serif;
        }

        /* CONTENEDOR PRINCIPAL: Centra todo el espacio de la pantalla */
        #pantalla-avatar {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: end;
            justify-content: center;
        }

        /* Encapsulamos el SVG en sus proporciones reales para obligar al navegador a obedecer la escala */
        #avatar-svg {
            width: 60vw;  
            height: 60vh; 
            display: block;
            transform: translateY(-5vh); /* Posición inicial elevada */
            transition: transform 0.1s ease;
            cursor: pointer; /* Muestra el cursor de mano al pasar sobre el avatar */
        }
        
        /* ANIMACIÓN DE SALTO: Sube 10vh adicionales (de -5vh a -15vh) y regresa */
        @keyframes efectoSalto {
            0% { transform: translateY(-5vh); }
            50% { transform: translateY(-15vh); }
            100% { transform: translateY(-5vh); }
        }

        /* Clase dinámica que aplicaremos con JavaScript */
        .animacion-salto {
            animation: efectoSalto 0.4s ease-out;
        }
        
        /* UBICACIÓN DE CONTROLES: Ajustado a la parte SUPERIOR derecha */
        .controles {
            position: absolute;
            top: 20px;
            right: 20px; 
            display: flex;
            gap: 10px;
            z-index: 8; 
            background: rgba(22, 36, 71, 0.75); 
            padding: 12px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        button {
            background-color: #0f4c75;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover { 
            background-color: #3282b8; 
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        } 

        /* UBICACIÓN DEL ESTADO: Posicionado justo DEBAJO de los botones en la parte superior derecha */
        #status { 
            position: absolute;
            top: 85px;
            right: 35px; 
            color: #00ffcc; 
            font-style: italic;
            z-index: 10;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div id="pantalla-avatar">
        <object id="avatar-svg" type="image/svg+xml" data="UCVsitoSVG.svg"></object>
    </div>

    <div id="status">Estado: Cargando a UCVsito...</div>

    <div class="controles">
        <button id="btn-hablar" onclick="activarMicrofono()">📢 Pregúntame </button>
        <button onclick="detenerTodo()">Detener</button>
    </div>

    <script>
        const svgObject = document.getElementById('avatar-svg');
        let svgDoc = null;
        let bocas = {};
        let intervaloHabla = null;
        const statusText = document.getElementById('status');
        const btnHablar = document.getElementById('btn-hablar');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconocimiento = null;
        
        // 🔥 Reemplazamos el sintetizador web local por una variable global para controlar el objeto de audio premium
        let audioActual = null; 

        if (SpeechRecognition) {
            reconocimiento = new SpeechRecognition(); 
            reconocimiento.lang = 'es-ES'; 
            reconocimiento.interimResults = false;
            reconocimiento.maxAlternatives = 1;

            reconocimiento.onresult = async (event) => {
                const textoDictado = event.results[0][0].transcript;
                statusText.innerText = `Escuchado: "${textoDictado}"...`;
                btnHablar.innerText = "⏳ Pensando...";
                btnHablar.style.backgroundColor = "#ffcc00";

                try {
                    const response = await fetch('https://asistente-virtual-vi44.onrender.com/preguntar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pregunta: textoDictado })
                    });
                    const data = await response.json();
                    
                    // 🔥 Enviamos tanto la respuesta en texto como el audio en Base64 devuelto por Google Cloud
                    reproducirVozYAnimar(data.respuesta, data.audio);
                } catch (error) {
                    console.error("Error conectando al servidor:", error);
                    statusText.innerText = "Estado: Error al conectar con el servidor.";
                    restaurarBoton();
                }
            };

            reconocimiento.onerror = (event) => {
                console.error("Error en micrófono: ", event.error);
                statusText.innerText = "Estado: Error en micrófono.";
                restaurarBoton();
            };

            reconocimiento.onspeechend = () => {
                reconocimiento.stop();
            };
        }

        svgObject.addEventListener('load', () => {
            svgDoc = svgObject.contentDocument;
            bocas = {
                'reposo': svgDoc.getElementById('boca-reposo'),
                'A': svgDoc.getElementById('boca-A'),
                'E': svgDoc.getElementById('boca-E'),
                'O': svgDoc.getElementById('boca-O')
            };
            inyectarAnimacionesNaturales(svgDoc);
            statusText.innerText = "Estado: En reposo";
            
            /* 🔥 FIX DE SALUDO INICIAL EN BASE64:
               Para que el saludo inicial use también la voz hiperrealista de Google Cloud TTS, 
               hacemos una consulta ficticia de bienvenida al servidor en cuanto carga el archivo. */
            setTimeout(async () => {
                try {
                    const response = await fetch('https://asistente-virtual-vi44.onrender.com/preguntar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pregunta: "¡Hola!, soy ucevesito, el asistente virtual de la ucv. Dime tu consulta" })
                    });
                    const data = await response.json();
                    reproducirVozYAnimar(data.respuesta, data.audio);
                } catch (error) {
                    console.warn("No se pudo reproducir el saludo inicial premium de forma automática:", error);
                }
            }, 600);

            /* ASIGNACIÓN DE CLIC/TOQUE: Escuchamos clics dentro del propio entorno gráfico del SVG */
            svgDoc.documentElement.addEventListener('click', ejecutarSaltoAvatar);
            svgDoc.documentElement.addEventListener('touchstart', ejecutarSaltoAvatar);
        });

        /* FUNCIÓN DE SALTO Y CAMBIO DE BOCA */
        function ejecutarSaltoAvatar() {
            const avatar = document.getElementById('avatar-svg');
            
            // Si ya está saltando, evitamos repetir la animación consecutivamente
            if (avatar.classList.contains('animacion-salto')) return;

            // Añadimos la clase CSS para iniciar el salto
            avatar.classList.add('animacion-salto');

            // Guardamos si estaba hablando para no romper el bucle aleatorio de la boca
            const estabaHablando = !!intervaloHabla;
            if (!estabaHablando) {
                cambiarBoca('A');
            }

            // Al finalizar la animación (400ms), limpiamos la clase y restauramos la boca
            setTimeout(() => {
                avatar.classList.remove('animacion-salto');
                if (!intervaloHabla) {
                    cambiarBoca('reposo');
                }
            }, 400);
        }

        function inyectarAnimacionesNaturales(doc) {
            const style = doc.createElementNS("http://www.w3.org/2000/svg", "style");
            style.textContent = `
                @keyframes parpadear {
                    0%, 90%, 100% { transform: scaleY(1); }
                    95% { transform: scaleY(0.0); }
                }
                #ojo-izq, #ojo-der {
                    transform-box: fill-box; 
                    transform-origin: center center; 
                    animation: parpadear 4s infinite;
                }

                @keyframes moverCejaIzq {
                    0%, 71%, 100% { transform: translateY(0px) rotate(0deg); }
                    73% { transform: translateY(-1.5px) rotate(-2deg); }
                    75% { transform: translateY(-1.5px) rotate(-2deg); }
                    80% { transform: translateY(0px) rotate(0deg); }
                }

                @keyframes moverCejaDer {
                    0%, 72%, 100% { transform: translateY(0px) rotate(0deg); }
                    75% { transform: translateY(-2.0px) rotate(1.5deg); }
                    77% { transform: translateY(-2.0px) rotate(1.5deg); }
                    80% { transform: translateY(0px) rotate(0deg); }
                }

                #ceja-izq {
                    transform-box: fill-box;
                    transform-origin: center center;
                    animation: moverCejaIzq 8s infinite ease-in-out;
                }

                #ceja-der {
                    transform-box: fill-box;
                    transform-origin: center center;
                    animation: moverCejaDer 8s infinite ease-in-out;
                }
            `;
            doc.documentElement.appendChild(style);
        }

        function cambiarBoca(tipoBoca) {
            Object.values(bocas).forEach(boca => {
                if(boca) boca.style.display = 'none';
            });
            if(bocas[tipoBoca]) {
                bocas[tipoBoca].style.display = 'block';
            }
        }

        function activarMicrofono() {
            if (!reconocimiento) {
                alert("Tu navegador no soporta control por voz. Prueba usando Google Chrome o Microsoft Edge.");
                return;
            }
            
            // 🔥 Detenemos cualquier flujo de audio anterior antes de escuchar de nuevo
            if (audioActual) {
                audioActual.pause();
                audioActual = null;
            }
            detenerAnimacionBoca();
            reconocimiento.start();
            statusText.innerText = "Estado: Escuchando micrófono...";
            btnHablar.innerText = "🛑 Escuchando...";
            btnHablar.style.backgroundColor = "#ff4d4d";
        }

        // 🔥 NUEVA FUNCIÓN OPTIMIZADA PARA REPRODUCIR AUDIO CLOUD EN BASE64
        function reproducirVozYAnimar(texto, audioBase64) {
            if (!audioBase64) {
                console.warn("No se recibió una cadena de audio válida desde el servidor.");
                restaurarBoton();
                return;
            }
            
            // Si hay un audio sonando, lo cancelamos de inmediato
            if (audioActual) {
                audioActual.pause();
            }

            // Convertimos los datos Base64 devueltos en una URI de tipo de dato MP3 reproducible
            const audioUrl = `data:audio/mp3;base64,${audioBase64}`;
            audioActual = new Audio(audioUrl);

            // Vinculamos los eventos nativos del reproductor de HTML5 con la animación del avatar
            audioActual.onplay = () => {
                statusText.innerText = "Estado: UCVsito está respondiendo...";
                btnHablar.innerText = "🗣️ Hablando...";
                btnHablar.style.backgroundColor = "#00cc66";

                // Iniciamos la modulación aleatoria de las capas de la boca
                iniciarAnimacionBoca();
            };

            audioActual.onended = () => {
                detenerAnimacionBoca();
                restaurarBoton();
                audioActual = null;
            };

            audioActual.onerror = (e) => {
                console.error("Error durante la reproducción del streaming de audio premium:", e);
                detenerAnimacionBoca();
                restaurarBoton();
                audioActual = null;
            };

            // Lanzamos la reproducción
            audioActual.play().catch(error => {
                console.warn("La reproducción automática de audio fue pausada por políticas del navegador:", error);
                detenerAnimacionBoca();
                restaurarBoton();
            });
        }

        function iniciarAnimacionBoca() {
            if (intervaloHabla) return;
            const formasDeBoca = ['A', 'E', 'O', 'reposo'];
            intervaloHabla = setInterval(() => {
                const bocaAleatoria = formasDeBoca[Math.floor(Math.random() * formasDeBoca.length)];
                cambiarBoca(bocaAleatoria);
            }, 130);
        }

        function detenerAnimacionBoca() {
            clearInterval(intervaloHabla);
            intervaloHabla = null;
            cambiarBoca('reposo');
        }

        function restaurarBoton() {
            btnHablar.innerText = "📢 Pregúntame";
            btnHablar.style.backgroundColor = "";
            statusText.innerText = "Estado: En reposo";
        }

        function detenerTodo() {
            if (reconocimiento) reconocimiento.stop();
            
            // 🔥 Detenemos el objeto de audio nativo si existe
            if (audioActual) {
                audioActual.pause();
                audioActual = null;
            }
            detenerAnimacionBoca();
            restaurarBoton();
        }
    </script>
</body>
</html>
