<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCVSITO TU ASISTENTE VIRTUAL</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-image: url('Fondo_ucv_tarapoto.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', sans-serif;
        }

        #pantalla-avatar {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: end;
            justify-content: center;
        }

        #avatar-svg {
            width: 60vw;  
            height: 60vh; 
            display: block;
            transform: translateY(-5vh);
            transition: transform 0.1s ease;
            cursor: pointer;
        }
        
        @keyframes efectoSalto {
            0% { transform: translateY(-5vh); }
            50% { transform: translateY(-15vh); }
            100% { transform: translateY(-5vh); }
        }

        .animacion-salto {
            animation: efectoSalto 0.4s ease-out;
        }
        
        .controles {
            position: absolute;
            top: 20px;
            right: 20px; 
            display: flex;
            gap: 10px;
            z-index: 8; 
            background: rgba(22, 36, 71, 0.75); 
            padding: 12px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        button {
            background-color: #0f4c75;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover { 
            background-color: #3282b8; 
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        } 

        #status { 
            position: absolute;
            top: 85px;
            right: 35px; 
            color: #00ffcc; 
            font-style: italic;
            z-index: 10;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div id="pantalla-avatar">
        <object id="avatar-svg" type="image/svg+xml" data="UCVsitoSVG.svg"></object>
    </div>

    <div id="status">Estado: Cargando a UCVsito...</div>

    <div class="controles">
        <button id="btn-hablar" onclick="iniciarConversacion()">📢 Pregúntame </button>
        <button onclick="detenerTodo()">Detener</button>
    </div>

    <script>
        const svgObject = document.getElementById('avatar-svg');
        let svgDoc = null;
        let bocas = {};
        let intervaloHabla = null;
        const statusText = document.getElementById('status');
        const btnHablar = document.getElementById('btn-hablar');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconocimiento = null;
        let audioActual = null; 

        // VARIABLES DE CONTROL PARA MODO MIXTO E INTELIGENTE
        let modoRepreguntaActivo = false; 
        let temporizadorSilencio = null;
        const TIEMPO_ESPERA_SILENCIO = 4000; // 4 segundos

        if (SpeechRecognition) {
            reconocimiento = new SpeechRecognition(); 
            reconocimiento.lang = 'es-ES'; 
            reconocimiento.interimResults = false;
            reconocimiento.maxAlternatives = 1;

            reconocimiento.onspeechstart = () => {
                limpiarTemporizadorSilencio();
            };

            reconocimiento.onresult = async (event) => {
                limpiarTemporizadorSilencio();
                const textoDictado = event.results[0][0].transcript.trim();
                const textoLimpio = textoDictado.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"");

                if (textoLimpio === "no") {
                    statusText.innerText = 'Escuchado: "No". Cerrando canal...';
                    despedirseYSalir();
                    return;
                }

                statusText.innerText = `Escuchado: "${textoDictado}"...`;
                btnHablar.innerText = "⏳ Pensando...";
                btnHablar.style.backgroundColor = "#ffcc00";

                try {
                    const response = await fetch('https://asistente-virtual-vi44.onrender.com/preguntar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pregunta: textoDictado })
                    });
                    const data = await response.json();
                    
                    modoRepreguntaActivo = true;
                    reproducirVozYAnimar(data.respuesta, data.audio);
                } catch (error) {
                    console.error("Error conectando al servidor:", error);
                    statusText.innerText = "Estado: Error al conectar con el servidor.";
                    apagarModoContinuo();
                }
            };

            reconocimiento.onerror = (event) => {
                console.error("Error en micrófono: ", event.error);
                if (event.error !== 'no-speech') {
                    statusText.innerText = "Estado: Error en micrófono.";
                    apagarModoContinuo();
                }
            };

            reconocimiento.onspeechend = () => {
                reconocimiento.stop();
            };
        }

        svgObject.addEventListener('load', () => {
            svgDoc = svgObject.contentDocument;
            bocas = {
                'reposo': svgDoc.getElementById('boca-reposo'),
                'A': svgDoc.getElementById('boca-A'),
                'E': svgDoc.getElementById('boca-E'),
                'O': svgDoc.getElementById('boca-O')
            };
            inyectarAnimacionesNaturales(svgDoc);
            statusText.innerText = "Estado: En reposo";
            
            // 🔥 RESTAURACIÓN DEL SALUDO INICIAL AUTOMÁTICO PREMIUM
            // Hacemos una petición limpia al backend en cuanto se monta el SVG en el navegador
            setTimeout(async () => {
                statusText.innerText = "Estado: Generando saludo institucional...";
                try {
                    const response = await fetch('https://asistente-virtual-vi44.onrender.com/preguntar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pregunta: "Hola soy ucevesito, el asistente virtual de la ucv. Dime tu consulta" })
                    });
                    const data = await response.json();
                    
                    // Activamos de inmediato el modo mixto para que tras saludar abra el micrófono automáticamente
                    modoRepreguntaActivo = true;
                    reproducirVozYAnimar(data.respuesta, data.audio);
                } catch (error) {
                    console.warn("No se pudo inicializar el saludo premium automático debido a restricciones locales del navegador:", error);
                    statusText.innerText = "Estado: En reposo (Pulsa el botón)";
                }
            }, 800);

            svgDoc.documentElement.addEventListener('click', ejecutarSaltoAvatar);
            svgDoc.documentElement.addEventListener('touchstart', ejecutarSaltoAvatar);
        });

        function ejecutarSaltoAvatar() {
            const avatar = document.getElementById('avatar-svg');
            if (avatar.classList.contains('animacion-salto')) return;
            avatar.classList.add('animacion-salto');
            const estabaHablando = !!intervaloHabla;
            if (!estabaHablando) cambiarBoca('A');
            setTimeout(() => {
                avatar.classList.remove('animacion-salto');
                if (!intervaloHabla) cambiarBoca('reposo');
            }, 400);
        }

        function inyectarAnimacionesNaturales(doc) {
            const style = doc.createElementNS("http://www.w3.org/2000/svg", "style");
            style.textContent = `
                @keyframes parpadear {
                    0%, 90%, 100% { transform: scaleY(1); }
                    95% { transform: scaleY(0.0); }
                }
                #ojo-izq, #ojo-der {
                    transform-box: fill-box; 
                    transform-origin: center center; 
                    animation: parpadear 4s infinite;
                }
                @keyframes moverCejaIzq {
                    0%, 71%, 100% { transform: translateY(0px) rotate(0deg); }
                    73% { transform: translateY(-1.5px) rotate(-2deg); }
                    75% { transform: translateY(-1.5px) rotate(-2deg); }
                    80% { transform: translateY(0px) rotate(0deg); }
                }
                @keyframes moverCejaDer {
                    0%, 72%, 100% { transform: translateY(0px) rotate(0deg); }
                    75% { transform: translateY(-2.0px) rotate(1.5deg); }
                    77% { transform: translateY(-2.0px) rotate(1.5deg); }
                    80% { transform: translateY(0px) rotate(0deg); }
                }
                #ceja-izq {
                    transform-box: fill-box;
                    transform-origin: center center;
                    animation: moverCejaIzq 8s infinite ease-in-out;
                }
                #ceja-der {
                    transform-box: fill-box;
                    transform-origin: center center;
                    animation: moverCejaDer 8s infinite ease-in-out;
                }
            `;
            doc.documentElement.appendChild(style);
        }

        function cambiarBoca(tipoBoca) {
            Object.values(bocas).forEach(boca => {
                if(boca) boca.style.display = 'none';
            });
            if(bocas[tipoBoca]) bocas[tipoBoca].style.display = 'block';
        }

        function iniciarConversacion() {
            modoRepreguntaActivo = false; 
            activarMicrofono();
        }

        function activarMicrofono() {
            if (!reconocimiento) {
                alert("Tu navegador no soporta control por voz.");
                return;
            }
            limpiarTemporizadorSilencio();
            if (audioActual) {
                audioActual.pause();
                audioActual = null;
            }
            detenerAnimacionBoca();

            try {
                reconocimiento.start();
                if (modoRepreguntaActivo) {
                    statusText.innerText = "Estado: Escuchando repregunta (Modo Continuo)...";
                    btnHablar.innerText = "🔄 Repregunta...";
                    btnHablar.style.backgroundColor = "#00bcd4";
                    
                    temporizadorSilencio = setTimeout(() => {
                        statusText.innerText = "Estado: Silencio detectado (4 segundos). Cerrando...";
                        despedirseYSalir();
                    }, TIEMPO_ESPERA_SILENCIO);
                } else {
                    statusText.innerText = "Estado: Escuchando micrófono...";
                    btnHablar.innerText = "🛑 Escuchando...";
                    btnHablar.style.backgroundColor = "#ff4d4d";
                }
            } catch(e) {
                console.warn("Reconocimiento ya estaba iniciado:", e);
            }
        }

        function reproducirVozYAnimar(texto, audioBase64) {
            if (!audioBase64) {
                apagarModoContinuo();
                return;
            }
            if (audioActual) audioActual.pause();

            const audioUrl = `data:audio/mp3;base64,${audioBase64}`;
            audioActual = new Audio(audioUrl);

            audioActual.onplay = () => {
                statusText.innerText = "Estado: UCVsito está respondiendo...";
                if (!modoRepreguntaActivo) {
                    btnHablar.innerText = "🗣️ Hablando...";
                    btnHablar.style.backgroundColor = "#00cc66";
                }
                iniciarAnimacionBoca();
            };

            audioActual.onended = () => {
                detenerAnimacionBoca();
                audioActual = null;

                if (modoRepreguntaActivo) {
                    setTimeout(() => {
                        activarMicrofono(); 
                    }, 400);
                } else {
                    apagarModoContinuo();
                }
            };

            audioActual.onerror = (e) => {
                console.error("Error en audio:", e);
                detenerAnimacionBoca();
                apagarModoContinuo();
            };

            audioActual.play().catch(error => {
                console.warn("Reproducción bloqueada automáticamente por el navegador:", error);
                detenerAnimacionBoca();
                apagarModoContinuo();
            });
        }

        async function despedirseYSalir() {
            if (reconocimiento) reconocimiento.stop();
            limpiarTemporizadorSilencio();
            modoRepreguntaActivo = false; 

            statusText.innerText = "Estado: Despidiéndose...";
            btnHablar.innerText = "👋 Despidiéndose...";
            btnHablar.style.backgroundColor = "#9c27b0";

            try {
                const response = await fetch('https://asistente-virtual-vi44.onrender.com/preguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: "Adiós gracias por tu ayuda" })
                });
                const data = await response.json();
                reproducirVozYAnimar(data.respuesta, data.audio);
            } catch (error) {
                console.warn("No se pudo obtener la despedida premium.");
                apagarModoContinuo();
            }
        }

        function limpiarTemporizadorSilencio() {
            if (temporizadorSilencio) {
                clearTimeout(temporizadorSilencio);
                temporizadorSilencio = null;
            }
        }

        function apagarModoContinuo() {
            limpiarTemporizadorSilencio();
            modoRepreguntaActivo = false;
            if (reconocimiento) reconocimiento.stop();
            if (audioActual) {
                audioActual.pause();
                audioActual = null;
            }
            detenerAnimacionBoca();
            btnHablar.innerText = "📢 Pregúntame";
            btnHablar.style.backgroundColor = "";
            statusText.innerText = "Estado: En reposo (Pulsa el botón)";
        }

        function detenerTodo() {
            apagarModoContinuo();
        }

        function iniciarAnimacionBoca() {
            if (intervaloHabla) return;
            const formasDeBoca = ['A', 'E', 'O', 'reposo'];
            intervaloHabla = setInterval(() => {
                const bocaAleatoria = formasDeBoca[Math.floor(Math.random() * formasDeBoca.length)];
                cambiarBoca(bocaAleatoria);
            }, 130);
        }

        function detenerAnimacionBoca() {
            clearInterval(intervaloHabla);
            intervaloHabla = null;
            cambiarBoca('reposo');
        }
    </script>
</body>
</html>
